x-stoplight:
  id: wnttpt5i2x0gz
info:
  title: Infloww API
  version: '1.0'
  summary: Explore Infloww's APIs to stream data to your dashboards.
  description: |-
    ## What is Infloww API?
    The Infloww API is a REST-based tool designed to stream raw performance data directly into your internal dashboards or custom BI tools.

    ## API capabilities
    To ensure data integrity and security, the Infloww API currently operates under the following parameters:
    - **Read-only access:** Pull data for analysis without the risk of altering or deleting data within your Infloww
    - **Integration limits:** This initial phase focuses on data retrieval. It does not support third-party tools requiring "action" permissions, such as external AI chatbots or automation platforms like Zapier.

    ## Request Headers
    All API requests must include the following headers:

    - Authorization: Bearer token used for API authentication.
    - x-oid: The agency identifier associated with your API key. This can be found in the API key page in Infloww ("Agency OID").

    ⚠️ If your request fails, please include the `x-request-id` from the response headers when contacting support. This helps us quickly locate and diagnose the issue.

    ## Available endpoints
    Access specific data points to fuel your agency's reporting:
    - **Creator information:** General profile data
    - **Revenue breakdown:** Detailed earnings by creator
    - **Chargeback analytics:** Tracking reversals and chargebacks
    - **Marketing analytics:** Performance stats for promotions, free trial links, and tracking links
    - More endpoints coming soon

    ## Access restrictions
    - All Infloww API endpoints currently return a maximum one year of historical data.This standard applies to the transactions and refunds endpoints, which are explicitly capped at one year.
        - The promotions, free trial and tracking links endpoints return the most recent 10,000 entries or data from the past year, whichever limit is reached first.
        - Connect creators endpoints have no time restrictions and are not subject to these data limitations.
    - There is a delay in data synchronization. Please see the description of each function for details.

    ## Your Infloww API key
    Generate your API key directly from your Infloww. [Learn how here](https://help.infloww.com/en/articles/596825-beta-infloww-api#h_99e8440d03).
