                  value:
                    data:
                      platformCode: OnlyFans
                      list:
                        - id: '001'
                          transactionId: xxx
                          fanId: onlyfans-02436724
                          fanName: xxxx
                          createdTime: '1750019015000'
                          type: Messages
                          status: loading
                          amount: '7400'
                          fee: '1480'
                          net: '5920'
                          currency: USD
                        - id: '002'
                          transactionId: xxx
                          fanId: onlyfans-97572292
                          fanName: Joseph· Anderson
                          createdTime: '1750020601000'
                          type: Messages
                          status: loading
                          amount: '13600'
                          fee: '2720'
                          net: '10880'
                          currency: USD
                        - id: '003'
                          transactionId: xxx
                          fanId: onlyfans-74521039
                          fanName: Mary· Jones
                          createdTime: '1750026171000'
                          type: Messages
                          status: loading
                          amount: '12300'
                          fee: '2460'
                          net: '9840'
                          currency: USD
                    cursor: '001'
                    hasMore: true
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
      operationId: get-transactions
      description: |-
        Pull a paginated list of revenue transactions for your connected creators. Filter by date range or transaction type—including tips, subscriptions, and ad revenue.

        > When synchronizing OnlyFans data, there is a delay of up to 1 hour. Transaction orders with a "loading" status are synchronized every 12 hours.
      x-stoplight:
        id: 67mitxq4tbi9i
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/x-oid'
        - $ref: '#/components/parameters/startTime'
        - $ref: '#/components/parameters/endTime'
        - $ref: '#/components/parameters/creatorId'
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/platformCode'
    parameters: []
