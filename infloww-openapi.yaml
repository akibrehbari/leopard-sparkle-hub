                          createdTime: '2026-02-27T15:30:00Z'
                          type: tip
                          tipSource: chat
                          status: completed
                          amount: 50
                          fee: 5
                          net: 45
                          currency: USD
                          platformCode: OF
                    cursor: eyJpZCI6MTAwMDF9
                    hasMore: true
                    errorMessage: null
                properties:
                  data:
                    type: object
                    description: 'Returned upon success, corresponding to the specific business data structure.'
                    properties:
                      list:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              description: Unique identifier
                            transactionId:
                              type: string
                              description: OnlyFans transaction ID
                            fanId:
                              type: string
                              description: Fan id
                            fanName:
                              type: string
                              description: Fan name
                            createdTime:
                              type: string
                              description: Creation time (unix timestamp in milliseconds)
                            tipSource:
                              type: string
                              description: Tip source
                              enum:
                                - Profile
                                - PostAll
                                - Chat
                                - Stream
                                - Story
                                - Unknown
                              format: enum
                            type:
                              description: Transaction type
                              type: string
                              enum:
                                - Subscription
                                - Recurring Subscription
                                - Tips
                                - Messages
                                - Referrals
                                - Streams
                                - Posts
                                - Unknown
                              format: enum
                            status:
                              type: string
                              description: Transaction status
                              enum:
                                - loading
                                - done
                                - undo
                                - pending_return
                              format: enum
                            amount:
                              type: string
                              description: Transaction amount (in the smallest unit of the currency)
                            fee:
                              type: string
                              description: Fee amount (in the smallest unit of the currency)
                            net:
                              type: string
                              description: Net amount (in the smallest unit of the currency)
                            currency:
                              type: string
                              description: Currency code
                      platformCode:
                        type: string
                        x-stoplight:
                          id: 6wm7asogg5z1o
                        description: Platform code
                  cursor:
                    type: string
                    description: Pagination cursor for retrieving next page of results
                  hasMore:
                    type: boolean
                    description: Indicates whether more data is available.
              examples:
