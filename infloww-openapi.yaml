  /v1/links:
    get:
      summary: List Links
      tags: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                x-examples:
                  Example 1:
                    data:
                      list:
                        - platformCode: OF
                          linkType: profile
                        - platformCode: FANSLY
                          linkType: chat
                    hasMore: true
                    cursor: eyJwYWdlIjoxfQ==
                    errorMessage: null
                properties:
                  data:
                    type: object
                    properties:
                      platformCode:
                        type: string
                        x-stoplight:
                          id: s0h8m5r5jis2g
                        description: Platform code
                      linkType:
                        type: string
                        x-stoplight:
                          id: jm8gge71u1bmz
                        description: Link type
                      list:
                        type: array
                        description: |
                          The returned data object.

                          **Important Association Rules**: The linkTypefield in this object indicates the specific data structure type for all elements in the listarray. The correspondences are as follows:
                          When the `platformCode` is `"OnlyFans"` and the `linkType` is `"CAMPAIGN"`, each object in the list follows the `CampaignLinkModel` structure.
                          When the `platformCode` is `"OnlyFans"` and the `linkType` is `"TRIAL"`, each object in the list follows the `TrialLinkModel` structure.
                          When the `platformCode` is `"OnlyFans"` and the `linkType` is `"TRACKING"`, each object in the list follows the `TrackingLinkModel` structure.
                        items:
                          x-stoplight:
                            id: lev1cbj5nxqu3
                          oneOf:
                            - title: CampaignLinkModel
                              description: |-
                                When the platformCode is OnlyFans and the linkType is CAMPAIGN, the following structure will be returned 
                                CampaignLinkModel
                              x-stoplight:
                                id: 3kgz5u48g1k01
                              x-internal: false
                              properties:
                                id:
                                  type: string
                                  description: Unique identifier
                                message:
                                  type: string
                                  description: Link description
                                type:
                                  type: string
                                  description: Target fan type
                                  enum:
                                    - new
                                    - expired
                                    - both
                                  format: enum
                                subCount:
                                  type: integer
                                  description: Current number of subscribers
                                subLimit:
                                  type: integer
                                  description: Subscription limit (`0` means no limit)
                                subDuration:
                                  type: integer
                                  description: Subscription duration (in days)
                                discount:
                                  type: integer
                                  description: 'Discount percentage (e.g., `30` represents `30%`)'
                                finishedFlag:
                                  type: boolean
                                  description: Link completion flag
                                earningsGross:
                                  type: integer
                                  description: 'Gross earnings (in the smallest unit of the currency) '
                                earningsNet:
                                  type: integer
                                  description: 'Net earnings (after deducting OnlyFans platform fees, in the smallest unit of the currency) '
                                payingFansCount:
                                  type: integer
                                  description: Paying fans count (includes subscription earnings)
                                currency:
                                  type: string
                                  description: Currency code
                                createdTime:
                                  type: string
                                  description: Link creation time (unix timestamp in milliseconds)
                                expiredTime:
                                  type: string
                                  description: 'Link expiration time (unix timestamp in milliseconds) '
                                updatedTime:
                                  type: string
                                  description: Infloww last update time (Unix millisecond timestamp)
                            - title: TrialLinkModel
                              description: |-
                                When the platformCode is OnlyFans and the linkType is TRIAL, the following structure will be returned 
                                TrialLinkModel
                              x-stoplight:
                                id: 5rdh89kctg82s
                              x-internal: false
                              properties:
                                id:
                                  type: string
                                  description: Unique identifier
                                name:
                                  type: string
                                  description: Link name
                                code:
                                  type: string
                                  description: |-
                                    The URL is constructed by concatenating this `code` with the following format:

                                    OF domain + current creator name + `code`

                                    For example,
                                    creator name: xxx, 
                                    code:123

                                    Link URL: `https://onlyfans.com/xxx/123`
                                subDuration:
                                  type: integer
                                  description: Trial duration (in days)
                                subLimit:
                                  type: integer
                                  description: Subscription limit (`0` means no limit)
                                subCount:
                                  type: integer
                                  description: Current number of subscribers
                                finishedFlag:
                                  type: boolean
                                  description: Link completion flag
                                source:
                                  type: string
                                  description: Link source
                                autoDefaultList:
                                  type: boolean
                                  description: |-
                                    Whether to automatically move subscribed fans to a default list
                                    - true: yes
                                    - false: no
                                defaultListName:
                                  type: string
                                  description: Default fan list name
                                relTagNames:
                                  type: array
                                  description: Related tag names
                                  items:
                                    type: string
                                spendClaim:
                                  type: string
                                  description: 'Percentage of fans who claimed a free trial that purchased subscriptions, spent on content, or gave tips'
                                payingFansCount:
                                  type: integer
                                  description: 'Number of fans who purchased subscriptions, spent on content, or gave tips'
                                earningsGross:
                                  type: integer
                                  description: Gross earnings (in the smallest unit of the currency)
                                earningsNet:
                                  type: integer
                                  description: 'Net earnings (after deducting OnlyFans platform fees, in the smallest unit of the currency)'
                                aepsGross:
                                  type: number
                                  description: Average gross earnings per subscriber (`EarningsGross` ÷ number of subscribers)
                                aepsNet:
                                  type: integer
                                  description: Average net earnings per subscriber (`EarningsNet` ÷ number of subscribers)
                                currency:
                                  type: string
                                  description: Currency code
                                createdTime:
                                  type: string
                                  description: Link creation time (unix timestamp in milliseconds)
                                expiredTime:
                                  type: string
                                  description: 'Link expiration time (unix timestamp in milliseconds) '
                                updatedTime:
                                  type: string
                                  description: Infloww last update time (unix timestamp in milliseconds)
                            - title: TrackingLinkModel
                              description: |-
                                When the platformCode is OnlyFans and the linkType is TRACKING, the following structure will be returned 
                                TrackingLinkModel
                              x-stoplight:
                                id: jat4iu4pt3teu
                              x-internal: false
                              properties:
                                id:
                                  type: string
                                  description: Unique identifier
                                name:
                                  type: string
                                  description: Link name
                                code:
                                  type: string
                                  description: |-
                                    The URL is constructed by concatenating this `code` with the following format:

                                    OF domain + current creator name + **'c'** + `code`

                                    For example,
                                    creator name: xxx, 
                                    code:123

                                    Link URL: `https://onlyfans.com/xxx/c123`
                                clickCount:
                                  type: integer
                                  description: Click count
                                subCount:
                                  type: integer
                                  description: Current number of subscribers
                                finishedFlag:
                                  type: boolean
                                  description: Link completion flag
                                source:
                                  type: string
                                  description: Link source
                                autoDefaultList:
                                  type: boolean
                                  description: |-
                                    Whether to automatically move subscribed fans to a default list
                                    - true: yes
                                    - false: no
                                defaultListName:
                                  type: string
                                  description: Default fan list name
                                relTagNames:
                                  type: array
                                  description: Related tag names
                                  items:
                                    type: string
                                earningsGross:
                                  type: integer
                                  description: Gross earnings (in the smallest unit of the currency)
                                earningsNet:
                                  type: integer
                                  description: 'Net earnings (after deducting OnlyFans platform fees, in the smallest unit of the currency)'
                                payingFansCount:
                                  type: integer
                                  description: Number of fans who spent on content or gave tips
                                subscriptionCVR:
                                  type: string
                                  description: Subscription conversion rate (percentage of clicks converted to subscribers)
                                spendingCVR:
                                  type: string
                                  description: 'Spending conversion rate: Percentage of fans who spent on content or gave tips'
                                epcGross:
                                  type: integer
                                  description: 'Earnings per click (gross, `EarningsGross` ÷ number of clicks)'
                                epcNet:
                                  type: number
                                  description: 'Earnings per click (net, after deducting OnlyFans platform fees, `EarningsNet` ÷ number of clicks) '
                                aepsGross:
                                  type: integer
                                  description: Average gross earnings per subscriber (`EarningsGross` ÷ number of subscribers)
                                aepsNet:
                                  type: integer
                                  description: Average net earnings per subscriber (`EarningsNet` ÷ number of subscribers)
                                currency:
                                  type: string
                                  description: currency
                                createdTime:
                                  type: string
                                  description: Link creation time (unix timestamp in milliseconds)
                                expiredTime:
                                  type: string
                                  description: 'Link expiration time (unix timestamp in milliseconds) '
                                updatedTime:
                                  type: string
                                  description: Infloww last update time （unix timestamp in milliseconds）
                          type: object
                  hasMore:
                    type: boolean
                    description: Indicates whether more data is available.
                  cursor:
                    type: string
                    description: Pagination cursor for retrieving next page of results
              examples:
                CAMPAIGN Example:
                  value:
                    data:
                      list:
                        - id: '1001'
                          message: Spring Promotion Campaign
                          type: new
                          subCount: 150
                          subLimit: 500
                          subDuration: 30
                          discount: 25
                          finishedFlag: false
                          earningsGross: 150000
                          earningsNet: 135000
                          payingFansCount: 120
                          currency: USD
                          createdTime: '1772448037492'
                          expiredTime: '1775040037492'
                          updatedTime: '1772448037492'
                    hasMore: true
                    cursor: '1002'
                TRIAL Example:
                  value:
                    data:
                      list:
                        - id: '2001'
                          name: 7-Day Free Trial Link
                          code: test
                          subDuration: 7
                          subLimit: 1000
                          subCount: 850
                          finishedFlag: false
                          source: trial_campaign_2024
                          autoDefaultList: true
                          defaultListName: Trial Subscribers
                          relTagNames:
                            - trial_users
                            - new_subscribers
                          spendClaim: '0'
                          payingFansCount: 550
                          earningsGross: 2500000
                          earningsNet: 2125000
                          aepsGross: 294118
                          aepsNet: 2500
                          currency: USD
                          createdTime: '1772448735447'
                          expiredTime: '1775040735447'
                          updatedTime: '1772448735447'
                    hasMore: true
                    cursor: '2002'
                TRACKING Example:
                  value:
                    data:
                      list:
                        - id: '3001'
                          name: Tracking Link - Spring Campaign
                          code: test
                          clickCount: 1250
                          subCount: 280
                          finishedFlag: false
                          source: spring_campaign_2024
                          autoDefaultList: true
                          defaultListName: Spring Campaign Subscribers
                          relTagNames:
                            - spring_campaign
                            - tracking
                          earningsGross: 420000
                          earningsNet: 378000
                          payingFansCount: 210
